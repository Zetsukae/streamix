<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bienvenue sur Streamix</title>
  <style>
    /* --- STYLE GITHUB DARK & ROUNDED --- */
    :root {
      --bg-canvas: #0d1117;       /* Fond principal */
      --bg-surface: #161b22;      /* Fond panneau */
      --border-color: #30363d;    /* Bordures */
      --text-main: #c9d1d9;       /* Texte blanc cassé */
      --text-muted: #8b949e;      /* Texte gris */
      --btn-bg: #21262d;
      --error-color: #f85149;
      --link-color: #58a6ff;
    }

    /* SCROLLBAR INVISIBLE */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: var(--bg-canvas);
      color: var(--text-main);
      height: 100vh;
      display: flex; justify-content: center; align-items: center;
      user-select: none;
      -webkit-app-region: drag; /* La fenêtre se déplace en la prenant n'importe où */
    }

    .setup-container {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      width: 420px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      -webkit-app-region: no-drag; /* Zone cliquable */
    }

    .logo { width: 64px; height: 64px; margin-bottom: 24px; opacity: 0.9; }

    h1 { font-size: 20px; font-weight: 600; margin: 0 0 12px 0; color: var(--text-main); }

    p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }

    .input-group { position: relative; margin-bottom: 24px; text-align: left; }

    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-main); }

    .radio-option {
      display: flex; align-items: center; padding: 12px; border: 1px solid var(--border-color);
      border-radius: 6px; background-color: var(--bg-canvas); cursor: pointer; margin-bottom: 8px;
      transition: 0.2s;
    }
    .radio-option:hover { border-color: var(--link-color); }
    .radio-option input { margin-right: 12px; accent-color: #238636; }
    .radio-option span { font-size: 14px; color: var(--text-main); }

    .custom-url-section {
      margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color);
    }
    .custom-url-section label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
    .custom-url-input { 
      width: 100%; padding: 8px 12px; background-color: var(--bg-canvas);
      border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main);
      font-size: 13px; box-sizing: border-box; margin-bottom: 8px;
    }
    .btn-add-url {
      width: 100%; padding: 8px; background-color: #21262d; color: var(--text-main);
      border: 1px solid var(--border-color); border-radius: 6px; font-size: 12px; cursor: pointer; margin-bottom: 12px;
    }
    .btn-add-url:hover { background-color: #30363d; }
    .saved-urls { margin-top: 8px; }

    .btn-launch {
      width: 100%; padding: 10px; background-color: #238636; color: white;
      border: 1px solid rgba(240, 246, 252, 0.1); border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-launch:hover { background-color: #2ea043; }

    .shake { animation: shake 0.5s; }
    @keyframes shake {
      0% { transform: translateX(0); } 25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); }
    }

    .footer-links { margin-top: 24px; font-size: 12px; color: var(--text-muted); }
    .link { color: var(--link-color); text-decoration: none; cursor: pointer; margin-left: 4px; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="setup-container">
    <img src="https://i.imgur.com/lv3zp1J.png" alt="Logo Streamix" class="logo">

    <h1>Configuration initiale</h1>
    <p>Sélectionnez votre site de streaming préféré pour commencer.</p>

    <div class="input-group">
      <label>Choisissez un site</label>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="selectedSite" value="franime" checked>
          <span>Franime (https://franime.fr/)</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="selectedSite" value="anime-sama">
          <span>Anime Sama (https://anime-sama.pw/)</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="selectedSite" value="streamex">
          <span>Streamex (https://streamex.sh/)</span>
        </label>
      </div>
    </div>

    <div class="custom-url-section">
      <label>Ou ajouter une URL personnalisée</label>
      <input type="text" id="customUrlInput" class="custom-url-input" placeholder="https://votre-site.com/">
      <button id="addCustomUrlBtn" class="btn-add-url">+ Ajouter cette URL</button>
      <div id="savedUrls" class="saved-urls"></div>
    </div>

    <button id="launchBtn" class="btn-launch">Lancer Streamix</button>

    <div class="footer-links">
      Pas de source ?
      <a id="findSourceLink" class="link">Trouver des sources</a>
    </div>
  </div>

  <script>
    const launchBtn = document.getElementById('launchBtn');
    const customUrlInput = document.getElementById('customUrlInput');
    const addCustomUrlBtn = document.getElementById('addCustomUrlBtn');
    const savedUrlsDiv = document.getElementById('savedUrls');

    // IPC pour charger les URLs sauvegardées
    let savedCustomUrls = [];
    if (window.electronAPI && window.electronAPI.getCustomUrls) {
      window.electronAPI.getCustomUrls().then(urls => {
        savedCustomUrls = urls || [];
        displaySavedUrls();
      }).catch(() => {});
    }

    function displaySavedUrls() {
      if (savedCustomUrls.length === 0) {
        savedUrlsDiv.innerHTML = '';
        return;
      }
      savedUrlsDiv.innerHTML = '<div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">URLs sauvegardées:</div>' +
        savedCustomUrls.map(url => `
          <label class="radio-option" style="margin-bottom: 8px;">
            <input type="radio" name="selectedSite" value="custom_${url}">
            <span>${url}</span>
          </label>
        `).join('');
    }

    addCustomUrlBtn.addEventListener('click', () => {
      const url = customUrlInput.value.trim();
      
      if (!url) {
        alert("Veuillez entrer une URL");
        return;
      }
      
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        alert("L'URL doit commencer par http:// ou https://");
        customUrlInput.style.borderColor = '#f85149';
        customUrlInput.focus();
        setTimeout(() => { customUrlInput.style.borderColor = 'var(--border-color)'; }, 2000);
        return;
      }
      
      if (savedCustomUrls.includes(url)) {
        alert("Cette URL est déjà ajoutée");
        return;
      }
      
      savedCustomUrls.push(url);
      if (window.electronAPI && window.electronAPI.saveCustomUrls) {
        window.electronAPI.saveCustomUrls(savedCustomUrls);
      }
      displaySavedUrls();
      customUrlInput.value = '';
      
      // Auto-select the new URL
      const newRadio = document.querySelector(`input[value="custom_${url}"]`);
      if (newRadio) newRadio.checked = true;
    });

    const siteMap = {
      "franime": "https://franime.fr/",
      "anime-sama": "https://anime-sama.pw/",
      "streamex": "https://streamex.sh/"
    };

    launchBtn.addEventListener('click', () => {
      const selectedRadio = document.querySelector('input[name="selectedSite"]:checked');
      const selectedValue = selectedRadio.value;
      let sourceUrl = siteMap[selectedValue];
      
      if (!sourceUrl && selectedValue.startsWith('custom_')) {
        sourceUrl = selectedValue.substring(7);
      }
      
      if (sourceUrl) {
        window.electronAPI.saveConfig({ selectedSite: selectedValue, sourceUrl });
      }
    });

    // LIEN VERS LES SOURCES (streamix.buzz)
    document.getElementById('findSourceLink').addEventListener('click', () => {
      window.electronAPI.openExternal('https://streamix.buzz/sources/');
    });
  </script>
</body>
</html>
